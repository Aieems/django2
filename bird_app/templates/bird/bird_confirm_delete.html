{% extends "base.html" %}
{%load static%}
{%block title_name%}
Удаление птицы
{%endblock%}

{%block content%}

<h1>Удалить птицу "{{ bird.name }}"?</h1>
<div class="delete-box">
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Удалить</button>
    </form>
</div>
<a href="{% url 'bird_list' %}" class="back-link">Вернуться к списку птиц</a>

{%endblock%}
