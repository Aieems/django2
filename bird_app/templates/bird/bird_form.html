{% extends "base.html" %}
{%load static%}
{%block title_name%}
Птица
{%endblock%}

{%block content%}

<h1>{% if form.instance.pk %}Редактировать птицу{% else %}Добавить птицу{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'bird_list' %}" class="back-link">Вернуться к списку птиц</a>

{%endblock%}
