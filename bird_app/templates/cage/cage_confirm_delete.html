{% extends "base.html" %}
{%load static%}
{%block title_name%}
Удаление клетки
{%endblock%}

{%block content%}

<h1>Удалить клетку "{{ cage.name }}"?</h1>
<div class="delete-box">
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Удалить</button>
    </form>
</div>
<a href="{% url 'cage_list' %}" class="back-link">Вернуться к списку клеток</a>

{%endblock%}
