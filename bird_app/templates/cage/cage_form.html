{% extends "base.html" %}
{%load static%}
{%block title_name%}
Клетка
{%endblock%}

{%block content%}

<h1>{% if form.instance.pk %}Редактировать клетку{% else %}Добавить клетку{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'cage_list' %}" class="back-link">Вернуться к списку клеток</a>

{%endblock%}
