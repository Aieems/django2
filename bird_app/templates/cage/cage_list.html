{% extends "base.html" %}
{%load static%}
{%block title_name%}
Клетки
{%endblock%}

{%block content%}

<h1>Клетки</h1>
<a href="{% url 'cage_create' %}" class="add-link">Добавить клетку</a>
<ul class="item-list">
    {% for item in cage_list %}
    <li class="item-card">
        {% if item.photo %}
            <img src="{{ item.photo.url }}" alt="{{ item.name }}" width="80">
        {% endif %}
        <a href="{% url 'cage_detail' item.pk %}" class="item-name">{{ item.name }}</a>
        <span class="item-price">— {{ item.price }} руб.</span>
        <a href="{% url 'cage_update' item.pk %}" class="action-edit">Редактировать</a>
        <a href="{% url 'cage_delete' item.pk %}" class="action-delete">Удалить</a>
    </li>
    {% endfor %}
</ul>
<a href="{% url 'home' %}" class="back-link">На главную</a>

{%endblock%}
