{% extends "base.html" %}
{%load static%}
{%block title_name%}
Категория
{%endblock%}

{%block content%}

<h1>{% if form.instance.pk %}Редактировать категорию{% else %}Добавить категорию{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'category_list' %}" class="back-link">Вернуться к списку категорий</a>

{%endblock%}
