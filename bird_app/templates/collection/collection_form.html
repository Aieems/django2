{% extends "base.html" %}
{%load static%}
{%block title_name%}
Коллекция
{%endblock%}

{%block content%}

<h1>{% if form.instance.pk %}Редактировать коллекцию{% else %}Добавить коллекцию{% endif %}</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'collection_list' %}" class="back-link">Вернуться к списку коллекций</a>

{%endblock%}
