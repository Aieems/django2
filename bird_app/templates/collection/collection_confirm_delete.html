{% extends "base.html" %}
{%load static%}
{%block title_name%}
Удаление коллекции
{%endblock%}

{%block content%}

<h1>Удалить коллекцию "{{ collection.name }}"?</h1>
<div class="delete-box">
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Удалить</button>
    </form>
</div>
<a href="{% url 'collection_list' %}" class="back-link">Вернуться к списку коллекций</a>

{%endblock%}
