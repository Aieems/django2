<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Удаление</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <h1>Магазин птиц «Перышко»</h1>
    </header>

<nav>
    <a href="{% url 'home' %}">Главная</a>
    <a href="{% url 'about' %}">О компании</a>
    <a href="{% url 'products' %}">Товары</a>
    <a href="{% url 'cart' %}">Корзина</a>
    |
    <a href="{% url 'category_list' %}">Категории (админ)</a>
    <a href="{% url 'collection_list' %}">Коллекции (админ)</a>
    <a href="{% url 'accessory_list' %}">Аксессуары (админ)</a>
    <a href="{% url 'bird_list' %}">Птицы (админ)</a>
    <a href="{% url 'cage_list' %}">Клетки (админ)</a>
    <a href="/admin/">Django Admin</a>
</nav>
<main>
    <h1>Удалить коллекцию "{{ collection.name }}"?</h1>
    <div class="delete-box">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn-delete">Удалить</button>
        </form>
    </div>
    <a href="{% url 'collection_list' %}" class="back-link">Вернуться к списку коллекций</a>
</main>
    <footer>
        <p>© Все права защищены.</p>
    </footer>
</body>
</html>
