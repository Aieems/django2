{% extends "base.html" %}
{%load static%}
{%block title_name%}
Категории товаров
{%endblock%}

{%block subnav%}
<nav class="subnav">
    <a href="{% url 'products' %}">Товары</a>
    <a href="{% url 'all_products' %}">Все товары</a>
</nav>
{%endblock%}

{%block content%}

<h2>Категории</h2>

{% for item in category_list %}
<div class="card">
    <h3>{{ item.name }}</h3>
    <p>{{ item.description }}</p>
</div>
{% endfor %}

{%endblock%}
