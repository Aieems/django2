{% extends "base.html" %}
{%load static%}
{%block title_name%}
Удаление аксессуара
{%endblock%}

{%block content%}

<h1>Удалить аксессуар "{{ accessory.name }}"?</h1>
<div class="delete-box">
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-delete">Удалить</button>
    </form>
</div>
<a href="{% url 'accessory_list' %}" class="back-link">Вернуться к списку аксессуаров</a>

{%endblock%}
