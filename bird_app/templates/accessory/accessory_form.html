{% extends "base.html" %}
{%load static%}
{%block title_name%}
Аксессуар
{%endblock%}

{%block content%}

<h1>{% if form.instance.pk %}Редактировать аксессуар{% else %}Добавить аксессуар{% endif %}</h1>
<form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Сохранить</button>
</form>
<a href="{% url 'accessory_list' %}" class="back-link">Вернуться к списку аксессуаров</a>

{%endblock%}
